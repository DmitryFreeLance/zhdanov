server:
  port: 8080

spring:
  application:
    name: wb-max-bot
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    ru.zhdanov.wbmaxbot: INFO

app:
  mode: run
  zone-id: Asia/Novosibirsk
  database-path: ./data/wb-max-bot.db
  scheduler:
    enabled: true
    fixed-delay: PT10M
    initial-delay: PT1M
  wildberries:
    report-url: https://logistics.wildberries.ru/reports/remainders/last-mile/chart
    headless: true
    timeout: PT45S
    bootstrap-timeout: PT30M
    storage-state-path: ./data/wb-storage-state.json
  max:
    enabled: false
    base-url: https://platform-api.max.ru
    long-polling-enabled: true
    long-polling-timeout: PT30S
    long-polling-limit: 100
    auto-register-webhook: false
    public-webhook-url:
    token:
    webhook-secret:
  alert:
    shk-threshold: 1200
    ratio-threshold: 0.9
    cooldown: PT30M
    send-report-each-run: true
    max-rows-in-message: 50
    voice-call-enabled: false
  telephony:
    provider: noop
    target-numbers: []
    mango:
      base-url: https://app.mango-office.ru
      api-key:
      api-salt:
      extension:
      from-number:
      line-number:
    twilio:
      base-url: https://api.twilio.com/2010-04-01
      account-sid:
      auth-token:
      from-number:
      language: ru-RU
      voice: alice
    zadarma:
      base-url: https://api.zadarma.com
      key:
      secret:
      from:
      sip:
      predicted: true
  admin:
    token:
