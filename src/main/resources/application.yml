server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: wb-max-bot
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    ru.zhdanov.wbmaxbot: INFO

app:
  mode: run
  zone-id: Asia/Yekaterinburg
  database-path: ./data/wb-max-bot.db
  scheduler:
    enabled: true
    fixed-delay: PT1M
    initial-delay: PT30S
  wildberries:
    report-url: https://logistics.wildberries.ru/reports/remainders/last-mile/chart
    headless: true
    browser-executable-path:
    proxy-server:
    proxy-username:
    proxy-password:
    timeout: PT45S
    bootstrap-timeout: PT30M
    storage-state-path: ./data/wb-storage-state.json
  max:
    enabled: false
    base-url: https://platform-api2.max.ru
    long-polling-enabled: true
    long-polling-timeout: PT30S
    long-polling-limit: 100
    auto-register-webhook: false
    public-webhook-url:
    bot-username:
    token:
    webhook-secret:
  alert:
    shk-threshold: 1200
    ratio-threshold: 0.8
    cooldown: PT30M
    send-report-each-run: true
    max-rows-in-message: 50
    voice-call-enabled: false
    voice-allowed-user-ids: []
  telephony:
    provider: noop
    target-numbers: []
    max-attempts: 3
    retry-delay-seconds: 15
    delivery-attempts: 3
    delivery-retry-delay-seconds: 5
    follow-up-threads: 6
    exolve:
      base-url: https://api.exolve.ru
      api-key:
      source-number:
      service-id:
      voice: 1
      lang: 1
      volume: -19
      speed: 1.0
      emotion: 1
    mango:
      base-url: https://app.mango-office.ru
      api-key:
      api-salt:
      extension:
      from-number:
      line-number:
    twilio:
      base-url: https://api.twilio.com/2010-04-01
      account-sid:
      auth-token:
      from-number:
      language: ru-RU
      voice: alice
    zadarma:
      base-url: https://api.zadarma.com
      key:
      secret:
      from:
      sip:
      predicted: true
  admin:
    token:
